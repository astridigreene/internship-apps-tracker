name: Deploy to GitHub Pages

# Builds the static shell only. Application rows are never baked into the build —
# visitors must sign in with Google to load the private spreadsheet.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          # Same classic PAT as Actions secret GH_PAT (repo scope). Baked into the
          # static site only to fire repository_dispatch — never sends sheet rows.
          VITE_GH_PAT: ${{ secrets.GH_PAT }}
          VITE_GITHUB_REPO: ${{ github.repository }}

      - name: Confirm GH_PAT is present for application ping
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "${GH_PAT}" ]; then
            echo "::error::Secret GH_PAT is missing. Add a classic PAT with repo scope as Actions secret GH_PAT, then redeploy. Application adds will not trigger empty commits without it."
            exit 1
          else
            echo "GH_PAT is set — application ping dispatch will be baked into this build."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
