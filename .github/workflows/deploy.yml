name: Deploy to GitHub Pages

# Builds the static shell only. Application rows are never baked into the build —
# visitors must sign in with Google to load the private spreadsheet.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # OAuth Web client ID only. Each visitor connects their own spreadsheet after sign-in.
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          # Optional: Apps Script Web App that triggers an empty commit (no app data).
          VITE_GITHUB_PING_URL: ${{ secrets.VITE_GITHUB_PING_URL }}
          VITE_GITHUB_PING_SECRET: ${{ secrets.VITE_GITHUB_PING_SECRET }}

      - name: Confirm ping secret is present
        env:
          VITE_GITHUB_PING_URL: ${{ secrets.VITE_GITHUB_PING_URL }}
        run: |
          if [ -z "${VITE_GITHUB_PING_URL}" ]; then
            echo "::warning::VITE_GITHUB_PING_URL secret is empty — adding an application will NOT ping GitHub."
          else
            echo "VITE_GITHUB_PING_URL is set — application ping will be baked into this build."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
