name: Application ping

# Empty commit only — never writes application data into the repo.
# Creates a short-lived branch + PR, then merges into main (works with
# “require a pull request” branch protection when reviews are not required).
on:
  repository_dispatch:
    types: [application-added, sheet-updated]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: application-ping
  cancel-in-progress: false

jobs:
  empty-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create empty commit, PR, and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: chore/application-activity-${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git commit --allow-empty -m "chore: application activity"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: application activity" \
            --body "Automated empty commit from the internship tracker (no application data)."

          # --admin bypasses some rules if the token can; without it, merge still works
          # when the only requirement is “must use a pull request” (no required reviews).
          gh pr merge --merge --delete-branch || gh pr merge --merge --admin --delete-branch
